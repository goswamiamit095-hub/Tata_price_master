<!DOCTYPE html>
<html>
<head><title>Calculator</title></head>
<body>

<h2>TP → SP</h2>
<input id="tp"><input id="margin">
<button onclick="tpToSp()">Calc</button>
<p id="sp"></p>

<h2>SP → TP</h2>
<input id="sp2"><input id="margin2">
<button onclick="spToTp()">Calc</button>
<p id="tp2"></p>

<a href="index.html">Back</a>

<script>
function tpToSp(){
 let tp=+tp.value,m=+margin.value;
 sp.innerText="SP: "+(tp*(1+m/100));
}
function spToTp(){
 let sp=+sp2.value,m=+margin2.value;
 tp2.innerText="TP: "+(sp/(1+m/100));
}
</script>

</body>
</html>
