<!DOCTYPE html>
<html>
<head>
  <title>Tata Pricing Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 Pricing Dashboard</h1>

<div class="controls">
  <input type="number" id="margin" placeholder="Enter Margin %" />
  <button onclick="loadData()">Load Pricing</button>

  <input type="text" id="search" placeholder="Search Product" onkeyup="applyFilters()">

  <select id="brandFilter" onchange="applyFilters()">
    <option value="">All Brands</option>
  </select>

  <select id="statusFilter" onchange="applyFilters()">
    <option value="">All Status</option>
  </select>

  <button onclick="downloadCSV()">Download</button>
  <button onclick="saveHistory()">Save</button>
</div>

<table id="table">
  <thead>
    <tr>
      <th>Product</th>
      <th>Brand</th>
      <th>Status</th>
      <th>TP</th>
      <th>SP</th>
      <th>MRP</th>
      <th>Profit %</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="nav">
  <a href="calculator.html">Calculator</a>
  <a href="history.html">History</a>
</div>

<script src="script.js"></script>
</body>
</html>
