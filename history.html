<!DOCTYPE html>
<html>
<body>

<h2>History</h2>
<div id="data"></div>

<button onclick="clearHistory()">Delete All</button>

<a href="index.html">Back</a>

<script>
let h = JSON.parse(localStorage.getItem("pricingHistory")||"[]");

h.forEach(x=>{
 let d=document.createElement("div");
 d.innerHTML=`<h4>${x.date}</h4><table>${x.data}</table>`;
 data.appendChild(d);
});

function clearHistory(){
 localStorage.removeItem("pricingHistory");
 location.reload();
}
</script>

</body>
</html>
